name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci && npm run build
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: npm i -D @capacitor/core @capacitor/cli @capacitor/android
      - run: npx cap init "OSP e-Remiza" pl.net.abakus.eremiza.web --web-dir=dist
      - run: npx cap add android && npx cap sync android
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: osp-eremiza-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
